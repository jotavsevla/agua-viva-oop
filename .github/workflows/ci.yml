---
name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

jobs:
  style-check:
    name: style-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff base
        id: base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install style tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python3 -m pip install --user yamllint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run style script on changed files
        run: |
          BASE_SHA="${{ steps.base.outputs.sha }}"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "Base SHA invalido; tentando merge-base com origin/main."
            BASE_SHA="$(git merge-base "$GITHUB_SHA" origin/main || true)"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse --verify "$GITHUB_SHA^" >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse "$GITHUB_SHA^")"
              echo "Usando commit pai como base: $BASE_SHA"
            else
              echo "Sem base diff disponivel; checando apenas arquivos do commit atual."
              mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only --diff-filter=ACMRT -r "$GITHUB_SHA")
              if [[ ${#changed_files[@]} -eq 0 ]]; then
                echo "Nenhum arquivo alterado para checar."
                exit 0
              fi
              scripts/check-style.sh "${changed_files[@]}"
              exit 0
            fi
          fi

          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$GITHUB_SHA")
          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "Nenhum arquivo alterado para checar."
            exit 0
          fi

          scripts/check-style.sh "${changed_files[@]}"

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  java-tests:
    name: java-tests
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Java tests in container
        run: scripts/tests/run-container-tests.sh --skip-solver --skip-ui

  solver-tests:
    name: solver-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run solver tests in container
        run: docker compose -f compose.yml --profile test run --rm test-solver

  ui-tests:
    name: ui-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run UI smoke tests in container
        run: docker compose -f compose.yml --profile test run --rm test-ui-node

  bootstrap-smoke-matrix:
    name: bootstrap-smoke-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize line endings (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git reset --hard HEAD

      - name: Setup mise toolchain
        uses: jdx/mise-action@v3
        with:
          version: "2026.3.3"
          install: true

      - name: Bootstrap dependencies via mise (macOS/Linux)
        if: runner.os != 'Windows'
        run: mise run ci:bootstrap

      - name: Bootstrap dependencies via mise (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: mise run ci:bootstrap:windows

      - name: Bootstrap smoke complete
        run: echo "Bootstrap smoke finalizado com sucesso."

  business-gate-pr:
    name: business-gate-pr
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise toolchain
        uses: jdx/mise-action@v3
        with:
          version: "2026.3.3"
          install: true

      - name: Run business gate (strict, PR deterministic slice)
        run: mise run ci:business-gate:pr

      - name: Upload business gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-gate-pr-artifacts
          path: artifacts/poc/business-gate-*
          if-no-files-found: warn

  business-gate-nightly:
    name: business-gate-nightly
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 110

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise toolchain
        uses: jdx/mise-action@v3
        with:
          version: "2026.3.3"
          install: true

      - name: Run business gate (strict, 3 rodadas)
        run: mise run ci:business-gate:nightly

      - name: Upload business gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-gate-nightly-artifacts
          path: artifacts/poc/business-gate-*
          if-no-files-found: warn
